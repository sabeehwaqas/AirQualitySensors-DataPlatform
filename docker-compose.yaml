services:
  broker:
    image: apache/kafka:3.7.2
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=mysimbdp
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_RACK=rack1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cqlsh -e 'DESCRIBE KEYSPACES' localhost 2>/dev/null | grep -q system",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - cassandra_data:/var/lib/cassandra

  cqlsh:
    image: cassandra:4.1
    container_name: cqlsh
    depends_on:
      - cassandra
    entrypoint: ["bash", "-lc", "sleep infinity"]

  streamingestmanager:
    build:
      context: .
      dockerfile: Dockerfile.platform
    image: mysimbdp-platform:latest
    container_name: streamingestmanager
    depends_on:
      - broker
      - cassandra
    environment:
      KAFKA_BOOTSTRAP: "broker:29092"
      CASSANDRA_HOST: "cassandra"
      MONITOR_URL: "http://streamingestmonitor:8002"
      REPORT_WINDOW_SEC: "10"
      MANAGER_NAME: "mysimbdp-streamingestmanager"
    ports:
      - "8001:8001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./state:/app/state
      - ./logs:/app/logs
    command: ["python", "streamingestmanager.py"]

  streamingestmonitor:
    build:
      context: .
      dockerfile: Dockerfile.platform
    image: mysimbdp-platform:latest
    container_name: streamingestmonitor
    depends_on:
      cassandra:
        condition: service_healthy
    environment:
      CASSANDRA_HOST: "cassandra"
      MONITOR_PORT: "8002"
      MANAGER_URL: "http://streamingestmanager:8001"
      MAX_AVG_INGEST_MS: "50"
      MIN_RECORDS_PER_WINDOW: "1"
    ports:
      - "8002:8002"
    command: ["python", "streamingestmonitor.py"]

  # ── Part 2: Batch Manager ─────────────────────────────────────────────────
  batchmanager:
    build:
      context: .
      dockerfile: Dockerfile.platform
    image: mysimbdp-platform:latest
    container_name: batchmanager
    depends_on:
      cassandra:
        condition: service_healthy
    environment:
      CASSANDRA_HOST: "cassandra"
      TENANT_CONFIGS_DIR: "/app/tenant_configs"
      CACHE_BASE_DIR: "/app/cache"
      BATCH_MANAGER_PORT: "8003"
      GCS_BUCKET: "airqualitybdpasg" # <-- add this
      GOOGLE_APPLICATION_CREDENTIALS: "/app/gcp-key.json" # <-- add this
    ports:
      - "8003:8003"
    volumes:
      # Mount cache dirs so pipeline cache files persist between runs
      - ./cache:/app/cache
      - ./logs:/app/logs
      - ./gcp-key.json:/app/gcp-key.json # <-- add this mount
    command: ["python", "batchmanager.py"]

volumes:
  cassandra_data:
